<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>GetFutureToday</title>
    <script>
      // SPA fallback para GitHub Pages (rafgraph/spa-github-pages).
      // Só redireciona em navegação de nível superior — não dentro de iframes,
      // para evitar que o React app seja carregado dentro do player de aulas.
      if (window.self === window.top) {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.host + '/' +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }
    </script>
  </head>
  <body></body>
</html>
